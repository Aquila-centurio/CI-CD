services:
  booktracker:
    build:
      context: .
      target: builder
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - REDIS_HOST=redis
      - PORT=8080
      - DATA_FILE=/app/data/books.json
    command: python app.py

  redis:
    ports:
      - "6379:6379"